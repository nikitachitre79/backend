steps:
  # Build backend image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "--build-arg",
        "FRONTEND=${_FRONTEND}",
        "-t",
        "${LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${_BACKEND_SERVICE_NAME}",
        ".",
      ]
 
  # Push backend image to artifact registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${_BACKEND_SERVICE_NAME}",
      ]
 
  # Deploy
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      [
        "run",
        "deploy",
        "${_BACKEND_SERVICE_NAME}",
        "--image=${LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${_BACKEND_SERVICE_NAME}",
        "--region=${LOCATION}",
        "--allow-unauthenticated",
        "--set-env-vars=FRONTEND=${_FRONTEND}"
      ]
 
images:
  - ${LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${_BACKEND_SERVICE_NAME}
 
substitutions:
  _BACKEND_SERVICE_NAME: g3-backend  
 
options:
  logging: CLOUD_LOGGING_ONLY